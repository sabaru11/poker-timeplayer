<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="/poker-timeplayer/manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Poker Timer">

<link rel="apple-touch-icon" href="/poker-timeplayer/icon.png">

<title>Dealer Timer</title>

<style>
body {
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
    margin: 0;
    overflow: hidden;
    touch-action: manipulation;
}

.timer-row {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#timer {
    font-size: 35vw;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    transition: 0.15s;
}

.danger {
    color: red;
}

.flash {
    animation: flash 0.5s infinite;
}

@keyframes flash {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}

#timer:active {
    transform: scale(0.95);
    opacity: 0.7;
}

#stack {
    font-size: 30px;
    color: #00ffcc;
}

.stack_div {
  position: absolute;
  right: 20px;
  top: 20px;
}
</style>

</head>

<body>

<div class="stack_div" id="stack">0</div>

<div class="timer-row" id="tapArea">
    <div id="timer">30</div>
</div>

<script>
let maxTime = 11;
let time = maxTime;
let stack = 0;
let interval;

// 🔊 ใช้ระบบเสียงจากโค้ดแรก
let audioCtx;
let audioUnlocked = false;

function unlockAudio() {
    if (audioUnlocked) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const buffer = audioCtx.createBuffer(1, 1, 22050);
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);

    audioUnlocked = true;
}

function beepSound(freq = 1000, duration = 0.1) {
    if (!audioUnlocked) return;

    if (audioCtx.state === "suspended") {
        audioCtx.resume();
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();

    gain.gain.setValueAtTime(1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + duration
    );

    osc.stop(audioCtx.currentTime + duration);
}

const timerDisplay = document.getElementById("timer");
const stackDisplay = document.getElementById("stack");
const tapArea = document.getElementById("tapArea");

function startTimer() {
    clearInterval(interval);

    time = maxTime;
    timerDisplay.innerText = time;
    timerDisplay.classList.remove("danger", "flash");

    interval = setInterval(() => {
        time--;
        timerDisplay.innerText = time;

        // 🔴 สีแดง
        if (time <= 10) {
            timerDisplay.classList.add("danger");
        }

        // 💥 กระพริบ
        if (time <= 5) {
            timerDisplay.classList.add("flash");
        }

        // 🔊 เสียง (ใช้แบบใหม่)
        if (time <= 5 && time > 0) {
            beepSound(1000, 0.08);
        }

        // 🔁 รีรอบ
        if (time < 0) {
            clearInterval(interval);

            stack++;
            updateStack();

            setTimeout(startTimer, 800);
        }

    }, 1000);
}

function updateStack() {
    stackDisplay.innerText = stack;
}

// 👆 แตะ = รี + unlock เสียง
tapArea.onclick = () => {

    if (!audioUnlocked) {
        unlockAudio();
    }

    stack = 0;
    updateStack();
    startTimer();
};

startTimer();
</script>

</body>
</html>
