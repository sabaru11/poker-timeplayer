<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="/poker-timeplayer/manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Poker Timer">

<link rel="apple-touch-icon" href="/poker-timeplayer/icon.png">

<title>Dealer Timer</title>

<style>
body {
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
    margin: 0;
    overflow: hidden;
    touch-action: manipulation;
}

.timer-row {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#timer {
    font-size: 35vw;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    transition: 0.15s;
}

.danger {
    color: red;
}

.flash {
    animation: flash 0.5s infinite;
}

@keyframes flash {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}

#timer:active {
    transform: scale(0.95);
    opacity: 0.7;
}

#stack {
    font-size: 30px;
    color: #00ffcc;
}

.stack_div {
  position: absolute;
  right: 20px;
  top: 20px;
}
</style>

</head>

<body>

<div class="stack_div" id="stack">0</div>

<div class="timer-row" id="tapArea">
    <div id="timer">30</div>
</div>

<!-- 🔊 เสียง -->
<audio id="beep" src="beep.mp3" preload="auto"></audio>
<!-- <audio id="endSound" src="end.mp3" preload="auto"></audio> -->

<script>
let maxTime = 11;
let time = maxTime;
let stack = 0;
let interval;

let audioUnlocked = false;

const timerDisplay = document.getElementById("timer");
const stackDisplay = document.getElementById("stack");
const tapArea = document.getElementById("tapArea");
const beep = document.getElementById("beep");
const endSound = document.getElementById("endSound");

function startTimer() {
    clearInterval(interval);

    time = maxTime;
    timerDisplay.innerText = time;
    timerDisplay.classList.remove("danger", "flash");

    interval = setInterval(() => {
        time--;
        timerDisplay.innerText = time;

        // 🔴 สีแดงเมื่อใกล้หมด
        if (time <= 10) {
            timerDisplay.classList.add("danger");
        }

        // 💥 กระพริบตอน 5 วิสุดท้าย
        if (time <= 5) {
            timerDisplay.classList.add("flash");
        }

        // 🔊 เสียงนับถอยหลัง
        if (time <= 5 && time > 0 && audioUnlocked) {
            const sound = beep.cloneNode(); // 👈 สำคัญมาก
            beep.play().catch(() => {});
        }

        // 🔁 รีรอบ
        if (time < 0) {
            clearInterval(interval);

            stack++;
            updateStack();

            setTimeout(startTimer, 800);
        }

    }, 1000);
}

function updateStack() {
    stackDisplay.innerText = stack;
}

// 👆 แตะ = รีทุกอย่าง + ปลดล็อกเสียง
tapArea.onclick = () => {

    if (!audioUnlocked) {
        beep.play().then(() => {
            beep.pause();
            beep.currentTime = 0;
            audioUnlocked = true;
        }).catch(() => {});
    }

    stack = 0;
    updateStack();
    startTimer();
};

startTimer();
</script>

</body>
</html>
