<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="/poker-timeplayer/manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Poker Timer">

<link rel="apple-touch-icon" href="/poker-timeplayer/icon.png">

<title>Dealer Timer</title>

<style>
body {
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
    margin: 0;
    overflow: hidden;
    touch-action: manipulation;
}

/* 👇 ทำให้พื้นที่กดใหญ่ทั้งจอ */
.timer-row {
  position: absolute;
  inset: 0; /* เต็มจอ */
  display: flex;
  align-items: center;
  justify-content: center;
}

#timer {
    font-size: 35vw; /* responsive เต็มจอ */
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
}

/* 🔴 ตอนใกล้หมด */
.danger {
    color: red;
}

/* เอฟเฟกต์ตอนกด */
#timer:active {
    transform: scale(0.95);
    opacity: 0.7;
}

#stack {
    font-size: 30px;
    color: #00ffcc;
}

.stack_div {
  position: absolute;
  right: 20px;
  top: 20px;
}
</style>

</head>

<body>

<div class="stack_div" id="stack">0</div>

<div class="timer-row" id="tapArea">
    <div id="timer">30</div>
</div>

<!-- 🔊 เสียง -->
<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
let maxTime = 30;
let time = maxTime;
let stack = 0;
let interval;

const timerDisplay = document.getElementById("timer");
const stackDisplay = document.getElementById("stack");
const tapArea = document.getElementById("tapArea");
const beep = document.getElementById("beep");

function startTimer() {
    clearInterval(interval);

    time = maxTime;
    timerDisplay.innerText = time;
    timerDisplay.classList.remove("danger");

    interval = setInterval(() => {
        time--;
        timerDisplay.innerText = time;

        // 🔴 เปลี่ยนสีตอน ≤ 10
        if (time <= 10) {
            timerDisplay.classList.add("danger");
        }

        // 🔊 เสียงตอน ≤ 5
        if (time <= 5 && time > 0) {
            beep.currentTime = 0;
            beep.play();
        }

        if (time <= 0) {
            clearInterval(interval);

            stack++;
            updateStack();

            startTimer();
        }
    }, 1000);
}

function updateStack() {
    stackDisplay.innerText = stack;
}

// 👆 กดตรงไหนก็ได้ = รีเวลา + รี stack
tapArea.onclick = () => {
    stack = 0; /* ✅ รีเป็น 0 ไปเลย */
    updateStack();
    startTimer();
};

// เริ่มครั้งแรก
startTimer();
</script>

</body>
</html>
