<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="/poker-timeplayer/manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Poker Timer">

<link rel="apple-touch-icon" href="/poker-timeplayer/icon.png">

<title>Player playtime</title>

<style>
body {
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
    margin: 0;
    overflow: hidden;
    touch-action: manipulation;
}

.timer-row {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#timer {
    font-size: 35vw;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
}

.danger {
    color: red;
}

/* ❌ ลบ hover ทิ้ง */
/* .clicktime:hover { color: rgb(0, 255, 13); } */

/* ✅ ใช้ตอนกด */
#timer:active {
    transform: scale(0.95);
    opacity: 0.7;
}

/* ✅ สีตอนแตะ */
.active-touch {
    color: rgb(0, 255, 13);
}

#stack {
    font-size: 30px;
    color: #00ffcc;
}

.stack_div {
  position: absolute;
  right: 20px;
  top: 20px;
}

@keyframes flash {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}

.flash {
    animation: flash 1s infinite ease-in-out;
}
</style>

</head>

<body>

<div class="stack_div" id="stack">0</div>

<div class="timer-row" id="tapArea">
    <div class="clicktime" id="timer">30</div>
</div>

<script>
let maxTime = 30;
let time = maxTime;
let stack = 0;
let interval;

/* 🔊 เสียง */
let audioCtx;
let audioUnlocked = false;

function unlockAudio() {
    if (audioUnlocked) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const buffer = audioCtx.createBuffer(1, 1, 22050);
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);

    audioUnlocked = true;
}

function playSharp() {
    if (!audioUnlocked) return;

    if (audioCtx.state === "suspended") {
        audioCtx.resume();
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = 1400;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();

    gain.gain.setValueAtTime(1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + 0.05
    );

    osc.stop(audioCtx.currentTime + 0.05);
}

const timerDisplay = document.getElementById("timer");
const stackDisplay = document.getElementById("stack");
const tapArea = document.getElementById("tapArea");

function startTimer() {
    clearInterval(interval);

    time = maxTime;
    timerDisplay.innerText = time;
    timerDisplay.classList.remove("danger", "flash");

    interval = setInterval(() => {
        time--;

        if (time <= 0) {
            time = 0;
            timerDisplay.innerText = time;

            clearInterval(interval);

            stack++;
            updateStack();

            setTimeout(() => {
                startTimer();
            }, 500);

            return;
        }

        timerDisplay.innerText = time;

        if (time <= 10) {
            timerDisplay.classList.add("danger");
        }

        if (time <= 5) {
            timerDisplay.classList.add("flash");
        } else {
            timerDisplay.classList.remove("flash");
        }

        if (time <= 5 && audioUnlocked) {
            playSharp();
        }

    }, 1000);
}

function updateStack() {
    stackDisplay.innerText = stack;
}

/* 👆 ปลดล็อก + รี */
tapArea.onclick = () => {
    if (!audioUnlocked) unlockAudio();

    stack = 0;
    updateStack();
    startTimer();
};

/* ✅ มือถือ: กด = เขียว ปล่อย = กลับ */
tapArea.addEventListener("touchstart", () => {
    timerDisplay.classList.add("active-touch");
});

tapArea.addEventListener("touchend", () => {
    timerDisplay.classList.remove("active-touch");
});

/* ✅ กันค้าง */
tapArea.addEventListener("touchcancel", () => {
    timerDisplay.classList.remove("active-touch");
});

startTimer();
</script>

</body>
</html>
