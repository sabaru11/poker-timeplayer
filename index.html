<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="/poker-timeplayer/manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Poker Timer">

<link rel="apple-touch-icon" href="/poker-timeplayer/icon.png">

<title>Dealer Timer</title>

<style>
html,body {
    font-family: Arial;
    background: #0d0d0d;
    color: #fff;
    height: 100%;
    margin: 0;
    overflow: hidden;
    touch-action: manipulation;
    overscroll-behavior: none;
    padding-bottom: env(safe-area-inset-bottom);
}

.timer-row {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#timer {
    font-size: 35vw;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
}

.danger {
    color: red;
}

#timer:active {
    transform: scale(0.95);
    opacity: 0.7;
}

#stack {
    font-size: 30px;
    color: #00ffcc;
}

.stack_div {
  position: absolute;
  right: 20px;
  top: 20px;
}
</style>

</head>

<body>

<div class="stack_div" id="stack">0</div>

<div class="timer-row" id="tapArea">
    <div id="timer">30</div>
</div>

<!-- 🔊 เปลี่ยนเป็น mp3 -->
<audio id="beep" src="/poker-timeplayer/beep.mp3" preload="auto"></audio>

<script>
let maxTime = 30;
let time = maxTime;
let stack = 0;
let interval;

/* 🔓 เพิ่มตัวแปรปลดล็อกเสียง */
let audioUnlocked = false;

const timerDisplay = document.getElementById("timer");
const stackDisplay = document.getElementById("stack");
const tapArea = document.getElementById("tapArea");
const beep = document.getElementById("beep");

function startTimer() {
    clearInterval(interval);

    time = maxTime;
    timerDisplay.innerText = time;
    timerDisplay.classList.remove("danger");

    interval = setInterval(() => {
        time--;
        timerDisplay.innerText = time;

        if (time <= 10) {
            timerDisplay.classList.add("danger");
        }

        /* 🔊 เล่นเสียงเฉพาะตอนปลดล็อกแล้ว (iPhone) */
        if (time <= 5 && time > 0 && audioUnlocked) {
            beep.currentTime = 0;
            beep.play();
        }

        if (time <= 0) {
            clearInterval(interval);

            stack++;
            updateStack();

            startTimer();
        }
    }, 1000);
}

function updateStack() {
    stackDisplay.innerText = stack;
}

/* 👆 เพิ่มการปลดล็อกเสียงตอนกดครั้งแรก */
tapArea.onclick = () => {

    if (!audioUnlocked) {
        beep.play().then(() => {
            beep.pause();
            beep.currentTime = 0;
            audioUnlocked = true;
        }).catch(() => {});
    }

    stack = 0;
    updateStack();
    startTimer();
};

startTimer();

document.body.addEventListener("touchstart", () => {}, { passive: true });
</script>

</body>
</html>
